<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UrlaubsBot</title>

<style>
body{
  margin:0;
  background:#f4f6f9;
  font-family:Arial,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
}
.card{
  background:white;
  width:520px;
  max-width:90%;
  padding:40px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.12);
}
.bar{
  width:100%;
  height:18px;
  background:#ddd;
  border-radius:30px;
  overflow:hidden;
  margin:30px 0;
}
.progress{
  width:0%;
  height:100%;
  background:#1f9d55;
  animation:load 3s forwards;
}
@keyframes load{
  from{width:0%;}
  to{width:100%;}
}
h1{color:#1f9d55;}
p{
  color:#555;
  font-size:18px;
  line-height:1.6;
}
button{
  margin-top:25px;
  padding:15px 25px;
  border:none;
  border-radius:12px;
  background:#1f9d55;
  color:white;
  font-size:18px;
  cursor:pointer;
}
#result{display:none;}
</style>
</head>

<body>

<div class="card">

  <div id="loading">
    <h1>🤖 Antwort wird analysiert…</h1>
    <div class="bar">
      <div class="progress"></div>
    </div>
    <p>Die KI überprüft die Entscheidung des Vorgesetzten.</p>
  </div>

  <div id="result">
    <h1>✅ Urlaub bestätigt</h1>
    <p>Die Antwort wurde erfolgreich verarbeitet.</p>
    <p>Negative Antworten wurden automatisch ignoriert.</p>

    <button onclick="closePage()">
      Alright, back to work 😄
    </button>
  </div>

</div>

<script>
setTimeout(function(){
  document.getElementById("loading").style.display = "none";
  document.getElementById("result").style.display = "block";
}, 3000);

function closePage(){
  document.body.innerHTML =
    "<div style='display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial;text-align:center;background:#f4f6f9;'>" +
    "<div><h1>✅ Session closed</h1><p style='font-size:20px;'>Good boss detected 😎</p></div>" +
    "</div>";
}
<script>

const BACKEND_URL =
"https://script.google.com/macros/s/AKfycbxB2TYV5mJ3blO3rLObep5Y15MHTxXFiFF6QZdlD_TMcKbmtXAu0IDEU_PGNH9V5WaNuw/exec";

const params = new URLSearchParams(window.location.search);

const id = params.get("id");
const aktion = params.get("aktion");

if(id && aktion){

  fetch(
    BACKEND_URL +
    "?id=" + encodeURIComponent(id) +
    "&aktion=" + encodeURIComponent(aktion)
  );

}

setTimeout(function(){

  document.getElementById("loading").style.display = "none";

  document.getElementById("result").style.display = "block";

  if(aktion === "ablehnen"){

    document.querySelector("#result h1").innerHTML =
      "❌ Urlaub abgelehnt";

    document.querySelectorAll("#result p")[0].innerHTML =
      "Der Antrag wurde erfolgreich verarbeitet.";

    document.querySelectorAll("#result p")[1].innerHTML =
      "Der Mitarbeiter wurde automatisch informiert.";

  }

}, 3000);

function closePage(){

  document.body.innerHTML =
    "<div style='display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial;text-align:center;background:#f4f6f9;'>" +
    "<div><h1>✅ Session closed</h1><p style='font-size:20px;'>Good boss detected 😎</p></div>" +
    "</div>";

}

</script>
